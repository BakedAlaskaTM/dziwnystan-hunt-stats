<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziwny</title>
</head>
<body>
    <table>
        {% for id, data in tracks.items() %}
        <tr>
            {% for key, value in data.items() %}
                {% if key == 'TrackId' %}
                <td><a href="/track/{{ value }}">{{ value }}</a></td>
                {% else %}
                <td>{{ value }}</td>
                {% endif %}
            {% endfor %}
        </tr>
        {% endfor %}
    </table>
</body>
</html>
